<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Expo QR</title>
<style>
  body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; color: white; }
  canvas { background: white; padding: 20px; border-radius: 16px; }
  p { margin-top: 20px; font-size: 18px; color: #aaa; }
  code { color: #7ee787; font-size: 16px; }
</style>
</head>
<body>
<canvas id="qr"></canvas>
<p>Сканируй камерой iPhone</p>
<p><code>exp://99f42_e-anonymous-8081.exp.direct</code></p>
<script>
// Minimal QR code generator (pure JS, no CDN needed)
// Using qrcode-generator embedded
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  document.querySelector('canvas').remove();
  const div = document.createElement('div');
  document.body.insertBefore(div, document.body.children[0]);
  new QRCode(div, {
    text: 'exp://99f42_e-anonymous-8081.exp.direct',
    width: 280,
    height: 280,
    colorDark: '#000000',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
